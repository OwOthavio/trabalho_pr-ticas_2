<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/aframe/aframe-ar.js"></script>
</head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded 
      renderer="logarithmicDepthBuffer: true; 
                antialias: true;
                precision: 'highp';"
      arjs="patternRatio:0.90; trackingMethod: best; maxAlternativeMarkers: 0;">
      
      <a-assets>
        <a-asset-item id="espada" src="espada.glb"></a-asset-item>
        <a-asset-item id="tank" src="Tank.glb"></a-asset-item>
        <a-asset-item id="salvador" src="salvador-origem-stl-resolucao-menor.glb"></a-asset-item>
      </a-assets>

      <a-marker type="pattern" url="pattern-sword_012.patt" smoothing="true" smoothingFactor="0.5">
        <a-entity gltf-model="#espada" scale="0.5 0.5 0.5"></a-entity>
      </a-marker>

      <a-marker type="pattern" url="pattern-planicie.patt" smoothing="true" smoothingFactor="0.5">
        <a-entity gltf-model="#salvador" scale="2 2 2"></a-entity>
      </a-marker>

      <a-marker type="pattern" url="pattern-tnk.patt" smoothing="true" smoothingFactor="0.5">
        <a-entity gltf-model="#tank" scale="1 1 1"></a-entity>
      </a-marker>
    </a-scene>
  </body>
</html>
