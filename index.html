<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
  </head>
  <body>
    <a-scene embedded 
      renderer="logarithmicDepthBuffer: true;"
      arjs="patternRatio:0.90">
      <!-- Place a-assets here, outside a-marker -->
      <a-assets>
        <a-asset-item id="espada" src="espada.glb"></a-asset-item>
        <a-asset-item id="tank" src="Tank.glb"></a-asset-item>
        <a-asset-item id="serra" src="serra catarinense2.glb"></a-asset-item>
        <a-asset-item id="planicie" src="salvador.glb"></a-asset-item>
      </a-assets>

      <a-marker type="pattern" url="pattern-sword_012.patt">
        <a-entity gltf-model="#espada" scale="0.25 0.25 0.25"></a-entity>
      </a-marker>

      <a-marker type="pattern" url="pattern-serra.patt">
        <a-entity gltf-model="#serra" scale="0.4 0.4 0.4" rotation="0 90 0"></a-entity>
      </a-marker>

      <a-marker type="pattern" url="pattern-tnk.patt">
        <a-entity gltf-model="#tank" scale="0.5 0.5 0.5" rotation="0 90 0"></a-entity>
      </a-marker>
      
      <a-marker type="pattern" url="pattern-planicie.patt">
        <a-entity gltf-model="#planicie" scale="0.4 0.4 0.4" rotation="0 90 0"></a-entity>
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
